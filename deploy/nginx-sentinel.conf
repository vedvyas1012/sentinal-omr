# Sentinal OMR — nginx reverse proxy.
# Copy to /etc/nginx/sites-available/sentinel.YOURDOMAIN.com, symlink into
# sites-enabled, then run certbot to add TLS:
#
#   sudo ln -s /etc/nginx/sites-available/sentinel.YOURDOMAIN.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d sentinel.YOURDOMAIN.com
#
# This is a standalone server block and does not touch biobid's config.

server {
    server_name sentinel.YOURDOMAIN.com;

    # OMR image uploads exceed nginx's 1M default
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3002;

        # WebSocket upgrade for Socket.IO (real-time login approval)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    listen 80;
}
